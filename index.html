<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简图床</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>⚡ 极简图床</h2>
        <p class="subtitle">支持拖拽、点击上传图片，限 5MB 内</p>
        
        <div class="drop-zone" id="dropZone">
            <p>📁 拖拽图片到此处 或 <span class="browse-btn">点击浏览</span></p>
            <input type="file" id="fileInput" accept="image/*" hidden>
        </div>

        <div class="preview-container" id="previewContainer" style="display: none;">
            <h3>预览与链接</h3>
            <img id="imagePreview" src="" alt="预览图">
            
            <div class="url-group">
                <label>URL 链接:</label>
                <div class="input-copy">
                    <input type="text" id="urlInput" readonly>
                    <button onclick="copyLink('urlInput')">复制</button>
                </div>
            </div>

            <div class="url-group">
                <label>Markdown:</label>
                <div class="input-copy">
                    <input type="text" id="mdInput" readonly>
                    <button onclick="copyLink('mdInput')">复制</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const urlInput = document.getElementById('urlInput');
        const mdInput = document.getElementById('mdInput');

        // 点击上传
        dropZone.addEventListener('click', () => fileInput.click());

        // 拖拽处理
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleUpload(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleUpload(e.target.files[0]);
        });

        // 上传核心逻辑
        async function handleUpload(file) {
            const formData = new FormData();
            formData.append('image', file);

            try {
                dropZone.innerText = "⏳ 正在上传...";
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    imagePreview.src = result.url;
                    urlInput.value = result.url;
                    mdInput.value = `![image](${result.url})`;
                    previewContainer.style.display = 'block';
                } else {
                    alert('上传失败: ' + result.message);
                }
            } catch (error) {
                alert('网络错误，上传失败');
            } finally {
                dropZone.innerHTML = '<p>📁 拖拽图片到此处 或 <span class="browse-btn">点击浏览</span></p>';
            }
        }

        // 复制功能
        function copyLink(inputId) {
            const input = document.getElementById(inputId);
            input.select();
            document.execCommand('copy');
            alert('链接已成功复制到剪贴板！');
        }
    </script>
</body>
</html>
